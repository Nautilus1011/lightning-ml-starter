services:
  dev:
    build:
      context: .
      args:
        USER_UID: 1000
        USER_GID: 1000
    working_dir: /app
    shm_size: '4gb'    # DataLoader の num_workers 使用時に /dev/shm 不足を防ぐ
    volumes:
      - .:/app
    tty: true
    stdin_open: true
    environment:
      - PYTHONUNBUFFERED=1
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
