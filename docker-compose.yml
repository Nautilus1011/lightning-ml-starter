services:
  dev:
    build:
      context: .
      args:
        USER_UID: 1000
        USER_GID: 1000
    working_dir: /app
    volumes:
      - .:/app
    tty: true
    stdin_open: true
    environment:
      PYTHONUNBUFFERED: "1"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
